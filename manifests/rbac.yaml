apiVersion: v1
kind: ServiceAccount
metadata:
  name: tagalong
  namespace: tagalong
---
# ClusterRole (not namespaced Roles) because tagalong's targets span multiple
# namespaces: default, linqlit, terraria, thorngate, rtl433, kubedash, webai.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tagalong
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tagalong
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tagalong
subjects:
  - kind: ServiceAccount
    name: tagalong
    namespace: tagalong
